services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: banndon
      POSTGRES_PASSWORD: banndon_secret
      POSTGRES_DB: banndon_finance
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://banndon:banndon_secret@db:5432/banndon_finance
      SESSION_SECRET: banndon-session-secret-change-in-production
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

volumes:
  pgdata:
